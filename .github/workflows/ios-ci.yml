name: iOS CI

on:
  pull_request:
  push:
    branches:
      - main
  workflow_dispatch:
    inputs:
      export_method:
        description: "Signed export method"
        required: true
        default: "ad-hoc"
        type: choice
        options:
          - ad-hoc
          - app-store
          - development

permissions:
  contents: read

jobs:
  build-simulator:
    name: Build iPad Simulator
    runs-on: macos-15

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Select Xcode
        uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: latest-stable

      - name: Make scripts executable
        run: chmod +x ci/*.sh

      - name: Build for iOS Simulator
        run: ./ci/build_simulator.sh

      - name: Upload simulator build logs
        if: always()
        uses: actions/upload-artifact@v6
        with:
          name: simulator-build-artifacts
          path: |
            build/logs
            build/DerivedData/Logs
          if-no-files-found: ignore

  archive-signed:
    name: Archive and Export IPA
    if: ${{ github.event_name == 'workflow_dispatch' }}
    runs-on: macos-15
    env:
      APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
      APP_BUNDLE_IDENTIFIER: ${{ secrets.APP_BUNDLE_IDENTIFIER }}
      BUILD_CERTIFICATE_BASE64: ${{ secrets.BUILD_CERTIFICATE_BASE64 }}
      P12_PASSWORD: ${{ secrets.P12_PASSWORD }}
      BUILD_PROVISION_PROFILE_BASE64: ${{ secrets.BUILD_PROVISION_PROFILE_BASE64 }}
      EXPORT_OPTIONS_PLIST_BASE64: ${{ secrets.EXPORT_OPTIONS_PLIST_BASE64 }}
      KEYCHAIN_PASSWORD: ${{ secrets.KEYCHAIN_PASSWORD }}
      EXPORT_METHOD: ${{ inputs.export_method }}

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Select Xcode
        uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: latest-stable

      - name: Make scripts executable
        run: chmod +x ci/*.sh

      - name: Install signing assets
        run: ./ci/install_signing_assets.sh

      - name: Archive and export
        run: ./ci/archive_and_export.sh

      - name: Upload IPA artifacts
        uses: actions/upload-artifact@v6
        with:
          name: signed-ipa
          path: |
            build/export
            build/TianlaiVotePad.xcarchive
            build/logs
          if-no-files-found: error

      - name: Cleanup signing assets
        if: always()
        run: ./ci/cleanup_signing.sh
